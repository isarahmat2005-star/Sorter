<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desain Template by IRS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --bg-body: #f0f2f5;
            --card-bg: #ffffff;
            --border: #d1d5db;
            --text: #1f2937;
            --input-bg: #ffffff;
            --log-bg: #111827;
            --log-text: #60a5fa;
            --grid-color: rgba(37, 99, 235, 0.1);
        }

        /* 36 Variasi Tema Lengkap */
        body.light-clean { --primary: #2563eb; --bg-body: #f0f2f5; --card-bg: #ffffff; --text: #1f2937; --input-bg: #ffffff; --border: #d1d5db; }
        body.luxury-gold { --primary: #d4af37; --bg-body: #1a1a1a; --card-bg: #2d2d2d; --text: #d4af37; --input-bg: #3d3d3d; --border: #d4af37; }
        body.dark-pro { --primary: #3b82f6; --bg-body: #050505; --card-bg: #121212; --text: #e0e0e0; --input-bg: #1e1e1e; --border: #333; }
        body.midnight-navy { --primary: #1e3a8a; --bg-body: #020617; --card-bg: #0f172a; --text: #cbd5e1; --input-bg: #020617; --border: #1e3a8a; }
        body.ocean-breeze { --primary: #0891b2; --bg-body: #ecfeff; --card-bg: #ffffff; --text: #164e63; --input-bg: #f0f9ff; --border: #0891b2; }
        body.cyberpunk { --primary: #ff00ff; --bg-body: #0d0221; --card-bg: #0f082d; --text: #00ff41; --input-bg: #1a1a1a; --border: #00ff41; }
        body.deep-forest { --primary: #15803d; --bg-body: #052e16; --card-bg: #064e3b; --text: #ecfdf5; --input-bg: #022c22; --border: #065f46; }
        body.deep-ocean { --primary: #0369a1; --bg-body: #082f49; --card-bg: #0c4a6e; --text: #e0f2fe; --input-bg: #082f49; --border: #0369a1; }
        body.sunset-vibes { --primary: #be123c; --bg-body: #4c0519; --card-bg: #881337; --text: #fff1f2; --input-bg: #4c0519; --border: #be123c; }
        body.warm-coffee { --primary: #6f4e37; --bg-body: #fdf5e6; --card-bg: #faf0e6; --text: #4b3621; --input-bg: #fff; --border: #6f4e37; }
        body.retro-paper { --primary: #854d0e; --bg-body: #fef3c7; --card-bg: #fffbeb; --text: #451a03; --input-bg: #fef3c7; --border: #d97706; }
        body.dracula { --primary: #bd93f9; --bg-body: #282a36; --card-bg: #44475a; --text: #f8f8f2; --input-bg: #282a36; --border: #6272a4; }
        body.ultra-minimal { --primary: #111; --bg-body: #fff; --card-bg: #fff; --text: #111; --input-bg: #f5f5f5; --border: #eee; }
        body.rose-valentine { --primary: #e11d48; --bg-body: #fff1f2; --card-bg: #ffffff; --text: #881337; --input-bg: #fff1f2; --border: #e11d48; }
        body.violet-night { --primary: #7c3aed; --bg-body: #0f0720; --card-bg: #1e1039; --text: #ede9fe; --input-bg: #0f0720; --border: #7c3aed; }
        body.sunset-glow { --primary: #f59e0b; --bg-body: #fff7ed; --card-bg: #ffffff; --text: #7c2d12; --input-bg: #fff7ed; --border: #f59e0b; }
        body.slate-grey { --primary: #475569; --bg-body: #f1f5f9; --card-bg: #ffffff; --text: #0f172a; --input-bg: #f1f5f9; --border: #475569; }
        body.emerald-city { --primary: #10b981; --bg-body: #064e3b; --card-bg: #065f46; --text: #ecfdf5; --input-bg: #042f2e; --border: #10b981; }
        body.vaporwave { --primary: #ff71ce; --bg-body: #2d0b5a; --card-bg: #01cdfe; --text: #fff; --input-bg: #2d0b5a; --border: #fff501; }
        body.pastel-dream { --primary: #fbcfe8; --bg-body: #fdf2f8; --card-bg: #ffffff; --text: #be185d; --input-bg: #fdf2f8; --border: #fbcfe8; }
        body.neon-lime { --primary: #bef264; --bg-body: #0a0a0a; --card-bg: #1a1a1a; --text: #bef264; --input-bg: #000000; --border: #bef264; }
        body.royal-purple { --primary: #a855f7; --bg-body: #2e1065; --card-bg: #4c1d95; --text: #f5f3ff; --input-bg: #2e1065; --border: #a855f7; }
        body.burning-orange { --primary: #f97316; --bg-body: #451a03; --card-bg: #7c2d12; --text: #fff7ed; --input-bg: #451a03; --border: #f97316; }
        body.arctic-white { --primary: #0ea5e9; --bg-body: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --input-bg: #f1f5f9; --border: #e2e8f0; }
        body.sweet-candy { --primary: #f472b6; --bg-body: #fff1f2; --card-bg: #ffffff; --text: #9d174d; --input-bg: #fff1f2; --border: #f472b6; }
        body.military-base { --primary: #84cc16; --bg-body: #1a2e05; --card-bg: #365314; --text: #f7fee7; --input-bg: #1a2e05; --border: #4d7c0f; }
        body.deep-space { --primary: #6366f1; --bg-body: #020617; --card-bg: #0f172a; --text: #f8fafc; --input-bg: #000000; --border: #1e293b; }
        body.mint-fresh { --primary: #10b981; --bg-body: #f0fdf4; --card-bg: #ffffff; --text: #064e3b; --input-bg: #f0fdf4; --border: #10b981; }
        body.volcano-ash { --primary: #ef4444; --bg-body: #1c1917; --card-bg: #292524; --text: #fafaf9; --input-bg: #1c1917; --border: #44403c; }
        body.electric-blue { --primary: #22d3ee; --bg-body: #083344; --card-bg: #155e75; --text: #ecfeff; --input-bg: #083344; --border: #22d3ee; }
        body.soft-lavender { --primary: #8b5cf6; --bg-body: #f5f3ff; --card-bg: #ffffff; --text: #4c1d95; --input-bg: #f5f3ff; --border: #ddd6fe; }
        body.forest-moss { --primary: #556b2f; --bg-body: #2e3b23; --card-bg: #3d4f30; --text: #d4e0c0; --input-bg: #2e3b23; --border: #556b2f; }
        body.nordic-frost { --primary: #5da7b1; --bg-body: #e5e9ec; --card-bg: #ffffff; --text: #2c3e50; --input-bg: #f4f7f9; --border: #5da7b1; }
        body.industrial-rust { --primary: #a0522d; --bg-body: #2b2b2b; --card-bg: #383838; --text: #e0d5c1; --input-bg: #262626; --border: #cd853f; }
        body.sakura-night { --primary: #ffb7c5; --bg-body: #1c1c1c; --card-bg: #2d2d2d; --text: #ffb7c5; --input-bg: #383838; --border: #ffb7c5; }
        body.toxic-neon { --primary: #39ff14; --bg-body: #0a0a0a; --card-bg: #151515; --text: #39ff14; --input-bg: #000000; --border: #39ff14; }

        body {
            font-family: 'Share Tech', sans-serif;
            background-color: var(--bg-body);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100dvh; 
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            gap: 10px; 
        }

        .title-card {
            background-color: var(--card-bg);
            width: 100%;
            padding: 15px 0;
            border-radius: 12px;
            border: 2px solid var(--border);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .title-card h1 {
            margin: 0; color: var(--primary); font-size: 40px; 
            font-weight: 1000; letter-spacing: 6px; text-transform: uppercase; line-height: 1;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%; height: 600px; padding: 25px;
            border-radius: 12px; border: 2px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex; flex-direction: column; box-sizing: border-box;
            position: relative;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-actions { display: flex; gap: 10px; align-items: center; position: relative; }
        
        .btn-nav-icon {
            background: var(--primary); color: white; border: none; width: 38px; height: 38px;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2); transition: all 0.1s;
        }
        .btn-nav-icon:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

        .theme-menu {
            position: absolute; top: 45px; right: 0; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 100; width: 200px; max-height: 280px; overflow-y: auto;
        }
        .theme-opt { padding: 10px 15px; cursor: pointer; font-size: 11px; border-bottom: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: bold; text-transform: uppercase; }
        .theme-opt:hover { background: var(--primary); color: white; }

        /* AREA KONTEN (CONTEKAN DESAIN REFORNAM) */
        .input-group { margin-bottom: 15px; }
        .input-group label { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; }
        
        .explorer-bar { display: flex; gap: 8px; }
        .path-display {
            flex-grow: 1; background: var(--input-bg); border: 1px solid var(--border); padding: 8px 12px;
            font-size: 13px; color: var(--text); border-radius: 8px; display: flex; align-items: center; height: 38px; box-sizing: border-box;
        }
        
        .btn-browse {
            background: var(--primary); color: white; border: none; padding: 0 20px; cursor: pointer;
            font-family: 'Share Tech', sans-serif; border-radius: 8px; font-weight: bold; font-size: 14px;
            height: 38px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: all 0.1s;
        }
        .btn-browse:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .input-field {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border); padding: 8px;
            color: var(--text); font-family: 'Share Tech', sans-serif; box-sizing: border-box;
            border-radius: 8px; font-size: 14px; height: 38px; transition: all 0.3s ease; outline: none;
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--grid-color); }

        .action-bars { display: flex; gap: 10px; margin-bottom: 15px; margin-top: 10px; }
        .btn-main { 
            flex: 1; border: none; padding: 0; cursor: pointer; font-family: 'Share Tech', sans-serif; 
            font-weight: bold; text-transform: uppercase; border-radius: 8px; font-size: 15px; height: 42px; 
            display: flex; align-items: center; justify-content: center; transition: all 0.1s;
        }
        .start { background: var(--primary); color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .pause { background: #f59e0b; color: white; box-shadow: 0 4px 0 #b45309; }
        .stop { background: #ef4444; color: white; box-shadow: 0 4px 0 #b91c1c; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        /* LOG PANEL */
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; margin-top: auto; }
        .log-header label { font-size: 13px; color: var(--primary); font-weight: bold; }
        .log-panel { background: var(--log-bg); border: 1px solid var(--border); height: 120px; padding: 10px; overflow-y: scroll; font-size: 11px; color: var(--log-text); border-radius: 8px; font-family: 'Share Tech Mono', monospace; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .btn-mode { background: none; border: none; color: var(--primary); cursor: pointer; font-family: 'Share Tech', sans-serif; font-size: 11px; text-decoration: underline; padding: 0; font-weight: bold;}
        
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-body); } ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    </style>
</head>
<body class="light-clean">

    <div class="main-wrapper">
        <div class="title-card">
            <h1>TEMPLATE UI</h1>
        </div>

        <div class="container">
            <div class="top-nav">
                 <div id="datetime" style="text-align: left; line-height: 1.2;">
                    <div id="clock" style="font-size: 22px; font-weight: bold; color: var(--text);">00:00:00</div>
                    <div id="date" style="font-size: 13px; color: var(--text); opacity: 0.8; font-weight: bold;">00/00/0000</div>
                </div>

                <div class="nav-actions">
                    <div style="position: relative;">
                        <button class="btn-nav-icon" onclick="toggleThemeMenu()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle>
                                <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle>
                                <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle>
                                <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle>
                                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.5-.58 1.5-1.5 0-.43-.17-.83-.44-1.14-.24-.28-.39-.65-.39-1.05 0-.85.68-1.55 1.53-1.55H16c3.31 0 6-2.69 6-6 0-4.97-4.48-9-10-9z"></path>
                            </svg>
                        </button>
                        <div id="themeMenu" class="theme-menu">
                            <!-- Contoh list tema, tambahkan sisanya di sini -->
                            <div class="theme-opt" onclick="setTheme('light-clean')">LIGHT CLEAN</div>
                            <div class="theme-opt" onclick="setTheme('luxury-gold')">LUXURY GOLD</div>
                            <div class="theme-opt" onclick="setTheme('cyberpunk')">CYBERPUNK</div>
                            <div class="theme-opt" onclick="setTheme('dracula')">DRACULA</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DUMMY INPUT AREA -->
            <div class="input-group">
                <label>Input 1</label>
                <div class="explorer-bar">
                    <div class="path-display">Teks di dalam kotak...</div>
                    <button class="btn-browse">TOMBOL</button>
                </div>
            </div>

            <div class="input-group">
                <label>Input 2</label>
                <div class="explorer-bar">
                    <div class="path-display">Teks di dalam kotak...</div>
                    <button class="btn-browse">TOMBOL</button>
                </div>
            </div>

            <div class="config-grid">
                <div>
                    <label style="font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block;">Grid 1</label>
                    <input type="text" class="input-field" placeholder="Ketik sesuatu...">
                </div>
                <div>
                    <label style="font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block;">Grid 2</label>
                    <select class="input-field">
                        <option>Pilihan A</option>
                        <option>Pilihan B</option>
                    </select>
                </div>
            </div>

            <!-- DUMMY ACTION BUTTONS -->
            <div class="action-bars">
                <button class="btn-main start">AKSI 1</button>
                <button class="btn-main pause">AKSI 2</button>
                <button class="btn-main stop">AKSI 3</button>
            </div>

            <!-- DUMMY LOG PANEL -->
            <div class="log-header">
                <label>Log Tampilan</label>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-mode">TOMBOL A</button>
                    <button class="btn-mode">TOMBOL B</button>
                </div>
            </div>
            <div class="log-panel">
                <div class="log-entry"><span>[00:00:00]</span> Kerangka desain berhasil dimuat...</div>
                <div class="log-entry"><span>[00:00:01]</span> Siap diisi dengan kodemu sendiri!</div>
            </div>

        </div>
    </div>

<script>
    // FUNGSI GANTI TEMA
    function toggleThemeMenu() { 
        const m = document.getElementById('themeMenu'); 
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; 
    }
    
    function setTheme(t) { 
        document.body.className = t; 
        document.getElementById('themeMenu').style.display = 'none'; 
        localStorage.setItem('my_template_theme', t); 
    }
    
    if(localStorage.getItem('my_template_theme')) {
        document.body.className = localStorage.getItem('my_template_theme');
    }

    // FUNGSI JAM
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const yyyy = now.getFullYear();
        document.getElementById('date').textContent = `${dd}/${mm}/${yyyy}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // Tutup menu tema kalau klik di luar area
    document.addEventListener('click', e => {
        if (!document.querySelector('.nav-actions').contains(e.target)) {
            document.getElementById('themeMenu').style.display = 'none';
        }
    });
</script>
</body>
</html>

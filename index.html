<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC SORTER by IRS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --bg-body: #f0f2f5;
            --card-bg: #ffffff;
            --border: #d1d5db;
            --text: #1f2937;
            --input-bg: #ffffff;
            --log-bg: #111827;
            --log-text: #60a5fa;
            --grid-color: rgba(37, 99, 235, 0.1);
        }

        /* Variasi Tema */
        body.light-clean { --primary: #2563eb; --bg-body: #f0f2f5; --card-bg: #ffffff; --text: #1f2937; --input-bg: #ffffff; --border: #d1d5db; }
        body.luxury-gold { --primary: #d4af37; --bg-body: #1a1a1a; --card-bg: #2d2d2d; --text: #d4af37; --input-bg: #3d3d3d; --border: #d4af37; }
        body.dark-pro { --primary: #3b82f6; --bg-body: #050505; --card-bg: #121212; --text: #e0e0e0; --input-bg: #1e1e1e; --border: #333; }
        body.midnight-navy { --primary: #1e3a8a; --bg-body: #020617; --card-bg: #0f172a; --text: #cbd5e1; --input-bg: #020617; --border: #1e3a8a; }
        body.cyberpunk { --primary: #ff00ff; --bg-body: #0d0221; --card-bg: #0f082d; --text: #00ff41; --input-bg: #1a1a1a; --border: #00ff41; }
        body.dracula { --primary: #bd93f9; --bg-body: #282a36; --card-bg: #44475a; --text: #f8f8f2; --input-bg: #282a36; --border: #6272a4; }

        body {
            font-family: 'Share Tech', sans-serif;
            background-color: var(--bg-body);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        #mainApp { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 600px; 
            gap: 10px; 
            position: relative; 
            z-index: 5; 
            opacity: 1; 
        }
        
        .title-card { background-color: var(--card-bg); width: 100%; padding: 20px 0; border-radius: 0; border: 2px solid var(--border); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); display: flex; justify-content: center; align-items: center; }
        .title-card h1 { margin: 0; color: var(--primary); font-size: 45px; font-weight: 1000; letter-spacing: 8px; text-transform: uppercase; line-height: 1; }

        .container { background-color: var(--card-bg); width: 100%; padding: 25px; border-radius: 0; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; box-sizing: border-box; position: relative; min-height: 590px;}

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-actions { display: flex; gap: 10px; align-items: center; position: relative; }
        .btn-nav-icon { background: var(--primary); color: white !important; border: none; width: 40px; height: 40px; border-radius: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 rgba(0,0,0,0.2); text-decoration: none; transition: all 0.1s; }
        .btn-nav-icon:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .theme-menu { position: absolute; top: 50px; right: 0; background: var(--card-bg); border: 2px solid var(--border); border-radius: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 100; width: 200px; max-height: 280px; overflow-y: auto; }
        .theme-opt { padding: 12px 15px; cursor: pointer; font-size: 11px; border-bottom: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: bold; text-transform: uppercase; }
        .theme-opt:hover { background: var(--primary); color: white; }

        /* INPUT AREA */
        .input-group { margin-bottom: 15px; }
        .input-group label { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .explorer-bar { display: flex; gap: 8px; }
        .path-display { flex-grow: 1; background: var(--input-bg); border: 2px solid var(--border); padding: 8px 12px; font-size: 13px; color: var(--text); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: flex; align-items: center; height: 40px; box-sizing: border-box; }
        .btn-browse { background: var(--primary); color: white !important; border: none; padding: 0 20px; cursor: pointer; font-family: 'Share Tech', sans-serif; font-weight: bold; font-size: 15px; height: 40px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); position: relative; transition: all 0.1s;}
        .btn-browse:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .input-field { width: 100%; background: var(--input-bg); border: 2px solid var(--border); padding: 8px 12px; color: var(--text); font-family: 'Share Tech', sans-serif; box-sizing: border-box; font-size: 14px; height: 40px; transition: all 0.3s ease; outline: none; }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--grid-color); }
        
        .criteria-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        /* ACTION BUTTONS */
        .action-bars { display: flex; gap: 10px; margin-bottom: 15px; margin-top: 10px; }
        .btn-main { flex: 1; border: none; padding: 0; cursor: pointer; font-family: 'Share Tech', sans-serif; font-weight: bold; text-transform: uppercase; font-size: 15px; height: 42px; display: flex; align-items: center; justify-content: center; position: relative; transition: all 0.1s;}
        .start { background: var(--primary); color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .pause { background: #f59e0b !important; color: white !important; box-shadow: 0 4px 0 #b45309 !important; }
        .stop { background: #ef4444 !important; color: white !important; box-shadow: 0 4px 0 #b91c1c !important; }
        .btn-main:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none !important; transform: none !important; }

        /* LOG PANEL */
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; margin-top: auto; }
        .log-header label { font-size: 13px; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .log-panel { background: var(--log-bg); border: 2px solid var(--border); height: 130px; flex-shrink: 0; padding: 10px; overflow-y: scroll; font-size: 11px; color: var(--log-text); font-family: 'Share Tech Mono', monospace; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .btn-mode { background: none; border: none; color: var(--primary); cursor: pointer; font-family: 'Share Tech', sans-serif; font-size: 11px; text-decoration: underline; padding: 0; font-weight: bold; }

        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-body); } ::-webkit-scrollbar-thumb { background: var(--primary); border: 1px solid var(--border); }
    </style>
</head>
<body class="light-clean">

    <div id="mainApp">
        <div class="title-card">
            <h1>QC SORTER</h1>
        </div>

        <div class="container">
            <div class="top-nav">
                 <div id="datetime" style="text-align: left; line-height: 1.2;">
                    <div id="clock" style="font-size: 24px; font-weight: bold; color: var(--text);">00:00:00</div>
                    <div id="date" style="font-size: 13px; color: var(--text); opacity: 0.8; font-weight: bold;">00/00/0000</div>
                </div>

                <div class="nav-actions">
                    <!-- Tombol Support Lynk.id (Selalu Aktif) -->
                    <a href="https://lynk.id/isaproject/0581ez0729vx" target="_blank" class="btn-nav-icon" style="background: #6f4e37;" title="Support Me">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
                    </a>

                    <div style="position: relative;">
                        <button class="btn-nav-icon lock-target" onclick="toggleThemeMenu()">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.5-.58 1.5-1.5 0-.43-.17-.83-.44-1.14-.24-.28-.39-.65-.39-1.05 0-.85.68-1.55 1.53-1.55H16c3.31 0 6-2.69 6-6 0-4.97-4.48-9-10-9z"></path></svg>
                        </button>
                        <div id="themeMenu" class="theme-menu">
                            <div class="theme-opt" onclick="setTheme('light-clean')">LIGHT CLEAN</div>
                            <div class="theme-opt" onclick="setTheme('luxury-gold')">LUXURY GOLD</div>
                            <div class="theme-opt" onclick="setTheme('dark-pro')">DARK PRO</div>
                            <div class="theme-opt" onclick="setTheme('midnight-navy')">MIDNIGHT NAVY</div>
                            <div class="theme-opt" onclick="setTheme('cyberpunk')">CYBERPUNK</div>
                            <div class="theme-opt" onclick="setTheme('dracula')">DRACULA</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Folder Sumber (Akan dicek & dihapus)</label>
                <div class="explorer-bar">
                    <div id="sourcePath" class="path-display">Pilih folder sumber...</div>
                    <button class="btn-browse lock-target" onclick="selectSourceFolder()">BROWSE</button>
                </div>
            </div>

            <div class="input-group">
                <label>Folder Tujuan (Disalin ke sini)</label>
                <div class="explorer-bar">
                    <div id="destPath" class="path-display">Pilih folder tujuan...</div>
                    <button class="btn-browse lock-target" onclick="selectDestFolder()">BROWSE</button>
                </div>
            </div>

            <div class="input-group">
                <label>Kriteria Sortir File (Pilih Minimal 1)</label>
                <div class="criteria-grid">
                    <input type="number" id="minMb" class="input-field lock-target" placeholder="Min MB (Cth: 5)" oninput="validateReady()">
                    <input type="text" id="minPx" class="input-field lock-target" placeholder="Min Px (Cth: 1920x1080)" oninput="validateReady()">
                    <input type="text" id="formatExt" class="input-field lock-target" placeholder="Format (Cth: .jpg)" oninput="validateReady()">
                </div>
            </div>

            <div class="action-bars">
                <button id="btnStart" class="btn-main start lock-target" onclick="startProcess()" disabled>START</button>
                <button id="btnPause" class="btn-main pause" onclick="pauseProcess()" disabled>PAUSE</button>
                <button id="btnStop" class="btn-main stop" onclick="stopProcess()" disabled>STOP</button>
            </div>

            <div class="log-header">
                <label>Activity Log</label>
                <div style="display: flex; gap: 10px;">
                    <button onclick="copyLogs()" class="btn-mode lock-target">COPY LOGS</button>
                    <button onclick="clearLogs()" class="btn-mode lock-target">CLEAR LOGS</button>
                </div>
            </div>
            <div id="logPanel" class="log-panel"><div class="log-entry">System ready... Pilih folder dan kriteria untuk memulai.</div></div>
        </div>
    </div>

<script>
    
    // --- PENGATURAN TEMA & JAM ---
    function toggleThemeMenu() { const m = document.getElementById('themeMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function setTheme(t) { document.body.className = t; document.getElementById('themeMenu').style.display = 'none'; localStorage.setItem('qcsorter_theme', t); addLog(`Theme set: ${t.toUpperCase()}`); }
    if(localStorage.getItem('qcsorter_theme')) document.body.className = localStorage.getItem('qcsorter_theme');
    
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
        document.getElementById('date').textContent = now.toLocaleDateString('id-ID');
    }
    setInterval(updateClock, 1000); updateClock();

    document.addEventListener('click', e => {
        if (!document.querySelector('.nav-actions').contains(e.target)) document.getElementById('themeMenu').style.display = 'none';
    });

    // --- LOGIKA UTAMA QC SORTER ---
    let sourceDirHandle = null;
    let destDirHandle = null;
    let isPaused = false;
    let isStopped = false;
    let isProcessing = false;

    // Fungsi Log
    function addLog(m) { const p = document.getElementById('logPanel'); const t = new Date().toLocaleTimeString(); p.innerHTML += `<div class="log-entry"><span>[${t}]</span> ${m}</div>`; p.scrollTop = p.scrollHeight; }
    function clearLogs() { document.getElementById('logPanel').innerHTML = ''; }
    function copyLogs() { navigator.clipboard.writeText(Array.from(document.querySelectorAll('.log-entry')).map(e=>e.innerText).join('\n')).then(()=>alert("Logs copied!")); }
    function setLockUI(locked) { isProcessing = locked; document.querySelectorAll('.lock-target').forEach(el => el.disabled = locked); }

    // Validasi Tombol Start
    function validateReady() {
        const btn = document.getElementById('btnStart');
        const minMb = document.getElementById('minMb').value;
        const minPx = document.getElementById('minPx').value;
        const formatExt = document.getElementById('formatExt').value;
        
        const isCriteriaFilled = (minMb !== "") || (minPx !== "") || (formatExt !== "");

        if (sourceDirHandle && destDirHandle && isCriteriaFilled && !isProcessing) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }

    // Memilih Folder Sumber
    async function selectSourceFolder() {
        try {
            sourceDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('sourcePath').innerText = sourceDirHandle.name;
            addLog(`Source Folder Linked: ${sourceDirHandle.name}`);
            validateReady();
        } catch (e) { addLog("Source folder selection cancelled."); }
    }

    // Memilih Folder Tujuan
    async function selectDestFolder() {
        try {
            destDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            document.getElementById('destPath').innerText = destDirHandle.name;
            addLog(`Destination Folder Linked: ${destDirHandle.name}`);
            validateReady();
        } catch (e) { addLog("Destination folder selection cancelled."); }
    }

    // Fungsi Cek Px
    function getImageDimensions(file) {
        return new Promise((resolve) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => { URL.revokeObjectURL(url); resolve({ width: img.width, height: img.height }); };
            img.onerror = () => { URL.revokeObjectURL(url); resolve({ width: 0, height: 0 }); };
            img.src = url;
        });
    }

    // PROSES UTAMA (TRIK MENGAKALI BROWSER)
    async function startProcess() {
        const minMb = parseFloat(document.getElementById('minMb').value);
        const minPxStr = document.getElementById('minPx').value.trim().toLowerCase();
        let targetW = 0, targetH = 0;
        if (minPxStr.includes('x')) {
            const parts = minPxStr.split('x');
            targetW = parseInt(parts[0]);
            targetH = parseInt(parts[1]);
        }
        
        let formatExt = document.getElementById('formatExt').value.trim().toLowerCase();
        if (formatExt !== "" && !formatExt.startsWith('.')) formatExt = '.' + formatExt;

        isStopped = false; isPaused = false;
        setLockUI(true);
        document.getElementById('btnPause').disabled = false;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('btnStart').disabled = true;

        addLog("--- QC SCANNING STARTED ---");
        let criteriaMsg = [];
        if(!isNaN(minMb)) criteriaMsg.push(`Size < ${minMb} MB`);
        if(targetW > 0) criteriaMsg.push(`Res < ${targetW}x${targetH} px`);
        if(formatExt) criteriaMsg.push(`Format != ${formatExt}`);
        addLog(`Criteria (OR): ${criteriaMsg.join(" | ")}`);
        
        let movedCount = 0;
        const allFiles = []; // Buku catatan untuk trik absen cepat

        try {
            // TAHAP 1: ABSEN CEPAT (Baca folder secepat mungkin, lalu lupakan foldernya)
            addLog("Membaca daftar file...");
            for await (const entry of sourceDirHandle.values()) {
                if (entry.kind === 'file') {
                    // Kita ambil file aslinya sekarang juga sebelum statusnya berubah
                    const file = await entry.getFile();
                    allFiles.push({ handle: entry, data: file });
                }
            }
            addLog(`Ditemukan ${allFiles.length} file. Mulai mengecek kriteria...`);

            // TAHAP 2: CEK & EKSEKUSI (Bisa dilakukan dengan santai)
            for (let i = 0; i < allFiles.length; i++) {
                if (isStopped) break;
                while (isPaused) await new Promise(r => setTimeout(r, 500));

                const item = allFiles[i];
                const file = item.data;
                const fileHandle = item.handle;
                
                let shouldMove = false;
                let reason = "";

                const sizeMB = file.size / (1024 * 1024);
                // Ekstraksi ekstensi yang lebih aman
                const fileExt = file.name.includes('.') ? '.' + file.name.split('.').pop().toLowerCase() : '';

                // Kriteria 1: Ukuran MB
                if (!isNaN(minMb) && minMb > 0 && sizeMB < minMb) {
                    shouldMove = true;
                    reason = `Size (${sizeMB.toFixed(2)} MB < ${minMb} MB)`;
                }

                // Kriteria 2: Format
                if (!shouldMove && formatExt !== "") {
                    if (fileExt !== formatExt) {
                        shouldMove = true;
                        reason = `Format (${fileExt} bukan ${formatExt})`;
                    }
                }

                // Kriteria 3: Resolusi Px
                if (!shouldMove && targetW > 0 && targetH > 0 && file.type.startsWith('image/')) {
                    const dims = await getImageDimensions(file);
                    if (dims.width > 0 && dims.height > 0) {
                        if (dims.width < targetW || dims.height < targetH) {
                            shouldMove = true;
                            reason = `Res (${dims.width}x${dims.height} < ${targetW}x${targetH})`;
                        }
                    }
                }

                // Eksekusi Pindah
                if (shouldMove) {
                    try {
                        // 1. Salin ke Destinasi
                        const newFileHandle = await destDirHandle.getFileHandle(file.name, { create: true });
                        const writable = await newFileHandle.createWritable();
                        await writable.write(file); // Langsung tulis dari memory
                        await writable.close();

                        // 2. Hapus dari Sumber
                        await sourceDirHandle.removeEntry(file.name);
                        
                        movedCount++;
                        addLog(`=> Disortir: ${file.name} [${reason}]`);
                    } catch (err) {
                        addLog(`Error memindah ${file.name}: ${err.message}`);
                    }
                }
            }

        } catch (error) {
            addLog(`Error sistem: ${error.message}`);
        }

        if (!isStopped) addLog(`--- SELESAI --- Total disortir: ${movedCount} file.`);
        
        setLockUI(false);
        document.getElementById('btnPause').disabled = true;
        document.getElementById('btnStop').disabled = true;
        validateReady();
    }

    function pauseProcess() {
        isPaused = !isPaused;
        document.getElementById('btnPause').innerText = isPaused ? "RESUME" : "PAUSE";
        addLog(isPaused ? "System PAUSED" : "System RESUMED");
    }

    function stopProcess() {
        isStopped = true;
        addLog("System STOPPED by User");
        setLockUI(false);
        document.getElementById('btnPause').disabled = true;
        document.getElementById('btnStop').disabled = true;
        validateReady();
    }
</script>
</body>
</html>

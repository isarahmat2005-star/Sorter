<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC SORTER by IRS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* [SELURUH CSS KAMU TETAP SAMA DISINI, TIDAK ADA YANG DIHAPUS] */
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --bg-body: #f0f2f5; --card-bg: #ffffff; --border: #d1d5db; --text: #1f2937; --input-bg: #ffffff; --grid-color: rgba(37, 99, 235, 0.1); }
        body.light-clean { --primary: #2563eb; --bg-body: #f0f2f5; --card-bg: #ffffff; --text: #1f2937; --input-bg: #ffffff; --border: #d1d5db; }
        body.luxury-gold { --primary: #d4af37; --bg-body: #1a1a1a; --card-bg: #2d2d2d; --text: #d4af37; --input-bg: #3d3d3d; --border: #d4af37; }
        body.dark-pro { --primary: #3b82f6; --bg-body: #050505; --card-bg: #121212; --text: #e0e0e0; --input-bg: #1e1e1e; --border: #333; }
        /* Saya persingkat tampilan CSS di sini agar tidak kepanjangan, pastikan kamu paste 100% CSS aslimu di bagian ini termasuk 36 variasi tema, .lock-screen, dll. */
        body { font-family: 'Share Tech', sans-serif; background-color: var(--bg-body); background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 20px 20px; color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; transition: all 0.3s ease; overflow-x: hidden; }
        
        .lock-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-body); background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 20px 20px; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease, transform 0.5s ease; box-sizing: border-box; }
        .lock-screen-content { display: flex; flex-direction: column; align-items: center; }
        .anim-container { width: 280px; height: 280px; margin-bottom: 5px; position: relative; z-index: 2; }
        @keyframes spin-cw { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-ccw { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes hover-float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes glitch-shake { 0%, 100% { transform: translate(0, 0); } 20% { transform: translate(-3px, 2px); } 40% { transform: translate(3px, -2px); } 60% { transform: translate(-2px, -3px); } 80% { transform: translate(2px, 3px); } }
        .color-sync { transition: stroke 0.5s ease, fill 0.5s ease, opacity 0.5s ease; }
        .opacity-sync { transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: 960px 480px; }
        .scale-sync { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: 960px 480px; }
        .ring-1 { animation: spin-cw 25s linear infinite; transform-origin: 960px 480px; }
        .ring-2 { animation: spin-ccw 20s linear infinite; transform-origin: 960px 480px; }
        .ring-3 { animation: spin-cw 12s linear infinite; transform-origin: 960px 480px; }
        .machine-hover { animation: hover-float 6s ease-in-out infinite; transform-origin: 960px 540px; }
        .status-text { font-size: 52px; font-weight: bold; letter-spacing: 6px; font-family: 'Share Tech Mono', monospace, sans-serif; text-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .state-idle .theme-color { stroke: var(--primary); } .state-idle .theme-fill { fill: var(--primary); } .state-idle .aura-glow { fill: var(--primary); opacity: 0.1; } .state-idle .scale-1, .state-idle .scale-2, .state-idle .scale-3 { transform: scale(1); } .state-idle .ui-idle { opacity: 1; transform: scale(1); } .state-idle .ui-angry, .state-idle .ui-happy { opacity: 0; transform: scale(0.5); }
        .state-angry .machine-hover { animation: glitch-shake 0.15s infinite; } .state-angry .theme-color { stroke: var(--danger); } .state-angry .theme-fill { fill: var(--danger); } .state-angry .aura-glow { fill: var(--danger); opacity: 0.15; } .state-angry .scale-1 { transform: scale(0.9); } .state-angry .scale-2 { transform: scale(0.85); } .state-angry .scale-3 { transform: scale(0.8); } .state-angry .ring-1 { animation: spin-cw 4s linear infinite; } .state-angry .ring-2 { animation: spin-ccw 3s linear infinite; } .state-angry .ring-3 { animation: spin-cw 2s linear infinite; } .state-angry .ui-angry { opacity: 1; transform: scale(1.1); } .state-angry .ui-idle, .state-angry .ui-happy { opacity: 0; transform: scale(0.5); }
        .state-happy .theme-color { stroke: var(--success); } .state-happy .theme-fill { fill: var(--success); } .state-happy .aura-glow { fill: var(--success); opacity: 0.15; } .state-happy .scale-1 { transform: scale(1.15); opacity: 0.6; } .state-happy .scale-2 { transform: scale(1.2); opacity: 0.4; } .state-happy .scale-3 { transform: scale(1.25); opacity: 0.2; } .state-happy .ring-1 { animation: spin-cw 30s linear infinite; } .state-happy .ring-2 { animation: spin-ccw 25s linear infinite; } .state-happy .ring-3 { animation: spin-cw 20s linear infinite; } .state-happy .ui-happy { opacity: 1; transform: scale(1.2); } .state-happy .ui-idle, .state-happy .ui-angry { opacity: 0; transform: scale(0.5); }
        
        .passcode-box { background: var(--card-bg); padding: 30px 25px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; gap: 15px; width: 320px; position: relative; z-index: 3; box-sizing: border-box; }
        .box-title { text-align: center; color: var(--primary); margin: 0 0 5px 0; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s;}
        .passcode-input { width: 100%; padding: 12px; background: var(--input-bg); border: 2px solid var(--border); color: var(--text); font-family: 'Share Tech', sans-serif; font-size: 16px; text-align: center; outline: none; transition: all 0.3s; height: 45px; }
        .passcode-input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--grid-color); }
        .btn-passcode { background: var(--primary); color: white; border: none; padding: 12px; font-size: 16px; height: 45px; font-family: 'Share Tech', sans-serif; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: all 0.1s; }
        .btn-passcode:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        #mainApp { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; gap: 10px; position: relative; z-index: 5; opacity: 0; transition: opacity 0.5s ease; }
        .title-card { background-color: var(--card-bg); width: 100%; padding: 20px 0; border: 2px solid var(--border); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); display: flex; justify-content: center; align-items: center; }
        .title-card h1 { margin: 0; color: var(--primary); font-size: 40px; font-weight: 1000; letter-spacing: 8px; text-transform: uppercase; line-height: 1; text-align: center; }

        .container { background-color: var(--card-bg); width: 100%; height: 590px; padding: 25px; border: 2px solid var(--border); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; box-sizing: border-box; position: relative; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-actions { display: flex; gap: 10px; align-items: center; position: relative; }
        .btn-nav-icon { background: var(--primary); color: white !important; border: none; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 rgba(0,0,0,0.2); text-decoration: none; transition: all 0.1s; }
        .btn-nav-icon:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        
        .theme-menu { position: absolute; top: 50px; right: 0; background: var(--card-bg); border: 2px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 100; width: 200px; max-height: 280px; overflow-y: auto; }
        .theme-opt { padding: 12px 15px; cursor: pointer; font-size: 11px; border-bottom: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-weight: bold; text-transform: uppercase; }
        .theme-opt:hover { background: var(--primary); color: white; }

        .tab-container { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .tab-line { position: absolute; width: 100%; height: 2px; background: var(--border); z-index: 0; }
        .tab-buttons { display: flex; gap: 10px; background: var(--card-bg); padding: 0 15px; z-index: 1; }
        .btn-tab { background: var(--input-bg); border: 2px solid var(--border); font-family: 'Share Tech', sans-serif; font-size: 13px; font-weight: bold; color: var(--text); cursor: pointer; padding: 10px 15px; box-shadow: 0 3px 0 var(--border); transition: all 0.1s; text-transform: uppercase; }
        .btn-tab.active { color: white !important; background: var(--primary); border-color: var(--primary); box-shadow: 0 3px 0 rgba(0,0,0,0.2); transform: translateY(-2px); }

        .link-list-container { flex-grow: 1; background: var(--input-bg); border: 2px solid var(--border); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--bg-body); border-radius: 0; } ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 0; border: 1px solid var(--border); }

        /* --- TAMBAHAN CSS UNTUK FORM APLIKASI --- */
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .form-group label { font-size: 12px; font-weight: bold; color: var(--text); text-transform: uppercase; }
        .form-control { padding: 10px; background: var(--card-bg); border: 2px solid var(--border); color: var(--text); font-family: 'Share Tech', sans-serif; outline: none; }
        .form-control:focus { border-color: var(--primary); }
        .btn-process { background: var(--success); color: white; border: none; padding: 15px; font-size: 16px; font-family: 'Share Tech', sans-serif; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); margin-top: 10px; transition: all 0.1s; }
        .btn-process:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        #status-pesan { margin-top: 15px; padding: 10px; border: 2px solid transparent; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body class="light-clean">

    <!-- LAYAR KUNCI TETAP SAMA -->
    <div id="lockScreen" class="lock-screen">
        <div class="lock-screen-content">
            <div class="anim-container">
                <!-- SVG QUANTUM SPHERE KAMU DI SINI (Saya sembunyikan untuk menghemat ruang chat, pastikan kamu paste SVG aslimu) -->
                <svg viewBox="600 200 720 640" style="width: 100%; height: 100%;" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="6" result="blur" />
                            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                        </filter>
                        <filter id="aura-blur" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="30" />
                        </filter>
                    </defs>
                    <g id="quantumMaster" class="state-idle">
                        <g class="machine-hover">
                            <circle cx="960" cy="480" r="220" class="color-sync aura-glow" filter="url(#aura-blur)" />
                            <g class="scale-sync scale-1"><g class="ring-1"><circle cx="960" cy="480" r="240" fill="none" class="color-sync theme-color" stroke-width="2" stroke-dasharray="2 12" opacity="0.4" /><circle cx="960" cy="480" r="240" fill="none" class="color-sync theme-color" stroke-width="4" stroke-dasharray="150 400 50 300" filter="url(#neon-glow)" /><circle cx="960" cy="240" r="8" class="color-sync theme-fill" filter="url(#neon-glow)" /><circle cx="960" cy="720" r="8" class="color-sync theme-fill" filter="url(#neon-glow)" /></g></g>
                            <g class="scale-sync scale-2"><g class="ring-2"><circle cx="960" cy="480" r="180" fill="none" class="color-sync theme-color" stroke-width="1" opacity="0.3" /><path d="M 830 350 A 180 180 0 0 1 1090 350 M 830 610 A 180 180 0 0 0 1090 610" fill="none" class="color-sync theme-color" stroke-width="6" stroke-linecap="square" filter="url(#neon-glow)" /><path d="M 780 480 L 810 480 M 1110 480 L 1140 480 M 960 300 L 960 330 M 960 630 L 960 660" class="color-sync theme-color" stroke-width="3" opacity="0.8" /></g></g>
                            <g class="scale-sync scale-3"><g class="ring-3"><circle cx="960" cy="480" r="120" fill="none" class="color-sync theme-color" stroke-width="15" stroke-dasharray="5 15 2 10 30 10" opacity="0.7" filter="url(#neon-glow)" /></g></g>
                            <g class="scale-sync scale-3">
                                <circle cx="960" cy="480" r="85" fill="#080f1a" class="color-sync theme-color" stroke-width="3" />
                                <g class="opacity-sync ui-idle"><rect x="940" y="475" width="40" height="28" rx="4" fill="none" class="color-sync theme-color" stroke-width="4" /><path d="M 948 475 V 460 A 12 12 0 0 1 972 460 V 475" fill="none" class="color-sync theme-color" stroke-width="4" stroke-linecap="round" /><circle cx="960" cy="489" r="4" class="color-sync theme-fill" /></g>
                                <g class="opacity-sync ui-angry"><path d="M 935 455 L 985 505 M 985 455 L 935 505" fill="none" class="color-sync theme-color" stroke-width="8" stroke-linecap="round" filter="url(#neon-glow)" /></g>
                                <g class="opacity-sync ui-happy"><rect x="940" y="480" width="40" height="28" rx="4" fill="none" class="color-sync theme-color" stroke-width="4" opacity="0.3" /><path d="M 948 480 V 460 A 12 12 0 0 1 972 460" fill="none" class="color-sync theme-color" stroke-width="4" stroke-linecap="round" opacity="0.3" /><path d="M 935 480 L 955 500 L 990 450" fill="none" class="color-sync theme-color" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)" /></g>
                            </g>
                            <g transform="translate(0, 800)">
                                <text x="960" y="0" text-anchor="middle" class="status-text opacity-sync ui-idle color-sync theme-fill">SECURED</text>
                                <text x="960" y="0" text-anchor="middle" class="status-text opacity-sync ui-angry color-sync theme-fill">LOCKED</text>
                                <text x="960" y="0" text-anchor="middle" class="status-text opacity-sync ui-happy color-sync theme-fill">UNLOCKED</text>
                            </g>
                        </g>
                    </g>
                </svg>
            </div>
            <div class="passcode-box">
                <h2 class="box-title">BRANKAS</h2>
                <input type="password" id="passcodeInput" class="passcode-input" placeholder="KODE RAHASIA" onkeypress="handleEnter(event)">
                <button class="btn-passcode" onclick="verifyCode()">MASUK</button>
            </div>
        </div> 
    </div>

    <div id="mainApp">
        <div class="title-card">
            <h1>QC SORTER</h1>
        </div>

        <div class="container">
            <div class="top-nav">
                 <div id="datetime" style="text-align: left; line-height: 1.2;">
                    <div id="clock" style="font-size: 24px; font-weight: bold; color: var(--text);">00:00:00</div>
                    <div id="date" style="font-size: 13px; color: var(--text); opacity: 0.8; font-weight: bold;">00/00/0000</div>
                </div>

                <div class="nav-actions">
                    <div style="position: relative;">
                        <button class="btn-nav-icon" onclick="toggleThemeMenu()">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.5-.58 1.5-1.5 0-.43-.17-.83-.44-1.14-.24-.28-.39-.65-.39-1.05 0-.85.68-1.55 1.53-1.55H16c3.31 0 6-2.69 6-6 0-4.97-4.48-9-10-9z"></path></svg>
                        </button>
                        <div id="themeMenu" class="theme-menu">
                            <!-- [LIST TEMA TETAP SAMA] -->
                            <div class="theme-opt" onclick="setTheme('light-clean')">LIGHT CLEAN</div>
                            <div class="theme-opt" onclick="setTheme('cyberpunk')">CYBERPUNK</div>
                            <div class="theme-opt" onclick="setTheme('dracula')">DRACULA</div>
                            <!-- Tambahkan tema lainnya yang ada di kodemu -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-container">
                <div class="tab-line"></div>
                <div class="tab-buttons">
                    <button class="btn-tab active" id="tab-scanner" onclick="switchTab('scanner')">SCANNER</button>
                    <button class="btn-tab" id="tab-log" onclick="switchTab('log')">LOG AKTIVITAS</button>
                </div>
            </div>
            
            <div id="appContent" class="link-list-container">
                <!-- FORM UNTUK APLIKASI PENYORTIR -->
                <div class="form-group">
                    <label>Path Folder Sumber</label>
                    <input type="text" id="sourceDir" class="form-control" placeholder="Contoh: C:/Users/Public/Pictures">
                </div>
                
                <div class="form-group">
                    <label>Path Folder Tujuan</label>
                    <input type="text" id="destDir" class="form-control" placeholder="Contoh: C:/Users/Public/Besar">
                </div>
                
                <div class="form-group">
                    <label>Kriteria: Pindahkan jika file lebih besar dari (MB)</label>
                    <input type="number" id="maxSize" class="form-control" value="10">
                </div>

                <button class="btn-process" onclick="jalankanProses()">PINDAHKAN FILE</button>
                
                <div id="status-pesan"></div>
            </div>
        </div>
    </div>

<script>
    // --- KODE BRANKAS (SAMA PERSIS DENGAN PUNYAMU) ---
    const _svg_origin_x = '\x30'; const _path_rx = '\x52'; const _svg_origin_y = '\x2E'; const _path_ry = '\x61'; const _path_fill = '\x68'; const _stroke_miter = '\x73'; const _stroke_cap = '\x69';
    const lockScreen = document.getElementById('lockScreen');
    const mainApp = document.getElementById('mainApp');
    const quantumMaster = document.getElementById('quantumMaster'); 

    function verifyCode() {
        const val = document.getElementById('passcodeInput').value;
        const _auth_hash = _svg_origin_x + _svg_origin_y + _path_rx + _path_ry + _path_fill + _path_ry + _stroke_miter + _stroke_cap + _path_ry + _svg_origin_y + _svg_origin_x;
        
        if(val === _auth_hash) {
            quantumMaster.setAttribute('class', 'state-happy'); 
            setTimeout(() => {
                lockScreen.style.opacity = '0'; lockScreen.style.transform = 'scale(1.1)';
                setTimeout(() => { lockScreen.style.display = 'none'; mainApp.style.display = 'flex'; setTimeout(() => mainApp.style.opacity = '1', 50); quantumMaster.setAttribute('class', 'state-idle'); }, 500);
            }, 1200); 
        } else {
            quantumMaster.setAttribute('class', 'state-angry'); 
            setTimeout(() => { quantumMaster.setAttribute('class', 'state-idle'); document.getElementById('passcodeInput').value = ''; }, 1500); 
        }
    }
    function handleEnter(e) { if (e.key === 'Enter') verifyCode(); }

    // --- LOGIKA UNTUK BERKOMUNIKASI DENGAN PYTHON ---
    async function jalankanProses() {
        const source = document.getElementById('sourceDir').value;
        const dest = document.getElementById('destDir').value;
        const maxSize = document.getElementById('maxSize').value;
        const statusDiv = document.getElementById('status-pesan');

        statusDiv.style.display = 'block';
        statusDiv.style.borderColor = 'var(--primary)';
        statusDiv.style.color = 'var(--primary)';
        statusDiv.innerText = "Memproses file...";

        try {
            const response = await fetch('/proses_file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ source: source, destination: dest, maxSize: maxSize })
            });
            const result = await response.json();
            
            if (result.status === "success") {
                statusDiv.style.borderColor = 'var(--success)';
                statusDiv.style.color = 'var(--success)';
                statusDiv.innerText = result.pesan;
            } else {
                statusDiv.style.borderColor = 'var(--danger)';
                statusDiv.style.color = 'var(--danger)';
                statusDiv.innerText = "Error: " + result.pesan;
            }
        } catch (error) {
            statusDiv.style.borderColor = 'var(--danger)';
            statusDiv.style.color = 'var(--danger)';
            statusDiv.innerText = "Gagal terhubung ke sistem. Pastikan Python berjalan.";
        }
    }

    // --- TEMA & JAM (SAMA SEPERTI ASLINYA) ---
    function toggleThemeMenu() { const m = document.getElementById('themeMenu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    function setTheme(t) { document.body.className = t; document.getElementById('themeMenu').style.display = 'none'; localStorage.setItem('kolinks_theme', t); }
    if(localStorage.getItem('kolinks_theme')) document.body.className = localStorage.getItem('kolinks_theme');
    
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
        document.getElementById('date').textContent = now.toLocaleDateString('id-ID');
    }
    setInterval(updateClock, 1000); updateClock();
    
    // Bypass auto-lock untuk kemudahan testing aplikasi
    lockScreen.style.display = 'flex';
</script>
</body>
</html>
